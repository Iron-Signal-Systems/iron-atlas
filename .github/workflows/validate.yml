name: validate
on:
  push:
    branches: [dev, main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install PostgreSQL tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql
          echo "$(pg_config --bindir)" >> "$GITHUB_PATH"
      - name: Make validators executable
        run: chmod +x tools/database/*.sh tools/validation/*.sh tools/validation/phase-gates/*.sh test-framework/*.sh test-framework/database/*
      - run: ./tools/validation/validate_repository.sh --skip-database
      - run: ./test-framework/run_all.sh
