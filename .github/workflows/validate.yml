name: validate
on:
  push:
    branches: [dev, main]
  pull_request:
permissions:
  contents: read

env:
  GOTOOLCHAIN: go1.26.5

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Create pinned ISRAS tool environment
        run: |
          chmod +x tools/environment/bootstrap_tools.sh
          ./tools/environment/bootstrap_tools.sh
          echo "ISRAS_PYTHON=$PWD/.isras-tools-venv/bin/python" >> "$GITHUB_ENV"
          echo "ISRAS_GO_TOOLS_BIN=$PWD/.isras-go-tools/bin" >> "$GITHUB_ENV"
          echo "$PWD/.isras-go-tools/bin" >> "$GITHUB_PATH"
      - name: Install PostgreSQL tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql
          echo "$(pg_config --bindir)" >> "$GITHUB_PATH"
      - name: Download and verify Go modules
        run: |
          go mod download
          go mod verify
      - name: Make validators executable
        run: find tools test-framework -type f -name "*.sh" -exec chmod +x {} +
      - run: python3 tools/validation/validate_toolchain.py
      - run: ./tools/validation/validate_repository.sh --skip-database
      - run: ./test-framework/run_all.sh
