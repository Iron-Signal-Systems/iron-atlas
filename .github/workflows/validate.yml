name: validate
on:
  push:
    branches: [dev, main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: ./tools/validation/validate_repository.sh
      - run: ./test-framework/run_all.sh
