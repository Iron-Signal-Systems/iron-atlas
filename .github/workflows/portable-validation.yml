name: Portable validation

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: portable-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  portable:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out exact GitHub event commit without an external action
        shell: bash
        env:
          ISRAS_GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          git init .
          git config core.autocrlf false
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          auth="$(printf 'x-access-token:%s' "$ISRAS_GITHUB_TOKEN" | base64 | tr -d '\n')"
          git -c "http.extraheader=AUTHORIZATION: basic ${auth}" \
            fetch --no-tags --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          unset auth ISRAS_GITHUB_TOKEN

      - name: Create pinned ISRAS tool environment
        shell: bash
        run: |
          chmod +x tools/environment/bootstrap_tools.sh
          ./tools/environment/bootstrap_tools.sh
          echo "ISRAS_PYTHON=$PWD/.isras-tools-venv/bin/python" >> "$GITHUB_ENV"
          echo "ISRAS_GO_TOOLS_BIN=$PWD/.isras-go-tools/bin" >> "$GITHUB_ENV"
          echo "$PWD/.isras-go-tools/bin" >> "$GITHUB_PATH"

      - name: Run repository-owned portable validation
        shell: bash
        run: |
          set -Eeuo pipefail
          chmod +x \
            tools/environment/bootstrap_go_tools.sh \
            tools/environment/verify_go_tools.sh \
            tools/environment/doctor.sh \
            tools/validation/validate_current.sh \
            tools/validation/validate_portable.sh \
            tools/validation/validate_fresh_clone.sh \
            tools/validation/validate_checkpoint.sh \
            tools/validation/validate_canonical.sh
          ./tools/validation/validate_portable.sh
